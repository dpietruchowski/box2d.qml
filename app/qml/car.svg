<svg width="300" height="180" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Car body -->
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main chassis polygon matching Box2D shape -->
  <polygon points="35,90 265,90 265,60 150,15 80,15 35,45" 
           fill="url(#carGradient)" 
           stroke="white" 
           stroke-width="4"/>
  
  <!-- Windows -->
  <polygon points="90,35 140,25 230,25 230,50 90,50" 
           fill="#3498db" 
           fill-opacity="0.6" 
           stroke="white" 
           stroke-width="2"/>
  
  <!-- Details -->
  <rect x="245" y="65" width="15" height="10" fill="#f39c12" rx="2"/>
  <rect x="40" y="65" width="15" height="10" fill="#f39c12" rx="2"/>
  
  <!-- Hood line -->
  <line x1="150" y1="15" x2="150" y2="90" stroke="white" stroke-width="2" opacity="0.5"/>
</svg>
